<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>C Program</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    padding:30px;
}

pre{
    background:#1f2937;
    padding:20px;
    border-radius:10px;
    overflow:auto;
}

button{
    padding:10px 20px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:15px;
}
</style>

</head>

<body>

<h1>Hello World Program</h1>

<button onclick="copyCode()">📋 Copy Code</button>

<pre id="code">
#include<stdio.h>

int main()
{
    printf("Hello World");
    return 0;
}
</pre>

<script>
function copyCode(){
    let text=document.getElementById("code").innerText;
    navigator.clipboard.writeText(text);
    alert("Code Copied!");
}
</script>

</body>
</html>
